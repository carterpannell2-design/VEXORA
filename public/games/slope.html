<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Slope - Vexora</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background: #000;
            font-family: 'Inter', sans-serif;
        }
        #game-container {
            width: 100%;
            height: 100%;
            display: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #vexora-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #05050a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        .loader-title {
            color: #fff;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(1); }
        }
        .progress-container {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
            transition: width 0.3s ease;
        }
        #play-button {
            display: none;
            padding: 12px 40px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #play-button:hover {
            background: #6366f1;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .loader-status {
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="vexora-loader">
        <div class="loader-title">VEXORA</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <button id="play-button">Play Game</button>
        <div id="loader-status" class="loader-status">Loading Slope...</div>
    </div>

    <div id="game-container">
        <iframe id="game-iframe" src="https://kdata1.com/2020/05/slope/" allow="fullscreen; autoplay"></iframe>
    </div>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const playButton = document.getElementById('play-button');
        const loaderStatus = document.getElementById('loader-status');
        const vexoraLoader = document.getElementById('vexora-loader');
        const gameContainer = document.getElementById('game-container');

        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 15;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                onLoadComplete();
            }
            progressBar.style.width = progress + '%';
        }, 200);

        function onLoadComplete() {
            loaderStatus.textContent = "Ready to Play";
            playButton.style.display = 'block';
            document.querySelector('.progress-container').style.display = 'none';
        }

        playButton.onclick = () => {
            vexoraLoader.style.opacity = '0';
            gameContainer.style.display = 'block';
            setTimeout(() => {
                vexoraLoader.style.display = 'none';
            }, 500);
        };
    </script>
</body>
</html>
