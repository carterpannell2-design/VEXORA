<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>ULTRAKILL - Vexora</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
        font-family: 'Inter', Arial, sans-serif;
      }
      #unity-canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #000;
        display: none;
      }
      #vexora-loader {
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        background: #05050a;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: white;
        z-index: 10;
        transition: opacity 0.5s ease;
      }
      .loader-title {
        color: #fff;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: 8px;
        margin-bottom: 30px;
        text-transform: uppercase;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { opacity: 0.8; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
        100% { opacity: 0.8; transform: scale(1); }
      }
      .progress-container {
        width: 300px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 20px;
      }
      #progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ef4444, #f97316);
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        transition: width 0.2s linear;
      }
      #play-button {
        display: none;
        padding: 12px 40px;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 4px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      #play-button:hover {
        background: #ef4444;
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
      }
      .loader-status {
        color: rgba(255, 255, 255, 0.5);
        font-size: 10px;
        margin-top: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      /* Ad styles */
      #ad-container {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: min(728px, calc(100% - 20px));
        height: 90px;
        background: rgba(0, 0, 0, 0.90);
        display: none;
        z-index: 99999;
        border-radius: 0;
        overflow: hidden;
        box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.45);
        box-sizing: border-box;
        transition: transform 0.5s ease-in-out;
      }
      #ad-container.hidden {
        transform: translate(-50%, 100%);
      }
      #ad-iframe {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 745px;
        height: 90px;
        border: 0;
        display: block;
        overflow: hidden;
        pointer-events: auto;
        box-sizing: content-box;
      }
      #close-ad {
        position: absolute;
        top: 6px;
        right: 8px;
        background: #ff4d4d;
        color: #fff;
        border: none;
        padding: 5px 9px;
        font-size: 13px;
        border-radius: 4px;
        cursor: not-allowed;
        opacity: 0.72;
        z-index: 100000;
        display: flex;
        align-items: center;
      }
      #close-ad.enabled {
        cursor: pointer;
        opacity: 1;
      }
      #close-ad::before {
        content: '↓';
        margin-right: 4px;
      }
      #ad-right-mask {
        position: absolute;
        top: 0;
        right: 0;
        width: 12px;
        height: 100%;
        pointer-events: none;
        background: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.9));
        z-index: 99999;
      }
      @media (max-width: 440px) {
        #ad-container {
          width: calc(100% - 12px);
          left: 50%;
          transform: translateX(-50%);
          border-radius: 0;
        }
        #ad-iframe {
          width: 728px;
        }
      }
    </style>
</head>
<body>
    <div id="vexora-loader">
        <div class="loader-title">VEXORA</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <button id="play-button">Play Ultrakill</button>
        <div id="loader-status" class="loader-status">Initializing Vexora Engine...</div>
    </div>

    <canvas id="unity-canvas" width="746" height="474"></canvas>

    <!-- Ad Container -->
    <div id="ad-container" aria-hidden="true" role="dialog" aria-label="Advertisement" class="hidden" style="display: block;">
      <iframe id="ad-iframe" src="https://script.google.com/macros/s/AKfycbzNG4z_PlG6Ke_bX5wSPKK2uBRB3IY9ouVzqM1shucYhSTvsJWRmyMyZaaC2z5S3ADN/exec" width="768px" height="95px" scrolling="no" frameborder="0" sandbox="allow-scripts allow-popups allow-same-origin"></iframe>
      <button id="close-ad" class="enabled">Close ↓</button>
      <div id="ad-right-mask"></div>
    </div>

    <!-- Loader CDN -->
    <script src="https://cdn.jsdelivr.net/gh/kelsimsk/ugil@main/Build/ultrakill.loader.js"></script>

    <script>
      // Mobile optimization
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      const vexoraLoader = document.getElementById("vexora-loader");
      const progressBar = document.getElementById("progress-bar");
      const loaderStatus = document.getElementById("loader-status");
      const playButton = document.getElementById("play-button");
      const unityCanvas = document.getElementById("unity-canvas");

      // Merge parts from CDN
      async function mergeParts(baseName, totalParts, progressWeight) {
        const parts = [];
        for (let i = 0; i < totalParts; i++) {
          const url = `https://cdn.jsdelivr.net/gh/kelsimsk/ugil@main/Build/${baseName}.part${i}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error(`Part ${i} failed to load: ${url}`);
          const buf = await res.arrayBuffer();
          parts.push(buf);

          // Update progress
          const percent = ((i + 1) / totalParts) * progressWeight;
          progressBar.style.width = percent + "%";
          loaderStatus.textContent = "Downloading Assets: " + Math.round(percent) + "%";
        }
        const blob = new Blob(parts, { type: "application/octet-stream" });
        return URL.createObjectURL(blob);
      }

      (async () => {
        const dataParts = 4;
        const wasmParts = 3;

        try {
          const dataUrl = await mergeParts("ultrakill.data.unityweb", dataParts, 40);
          const wasmUrl = await mergeParts("ultrakill.wasm.unityweb", wasmParts, 80);

          createUnityInstance(unityCanvas, {
            dataUrl: dataUrl,
            frameworkUrl: "https://cdn.jsdelivr.net/gh/kelsimsk/ugil@main/Build/ultrakill.framework.js.unityweb",
            codeUrl: wasmUrl,
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Hakita",
            productName: "ULTRAKILL WEB PORT",
            productVersion: "1.5",
          }, (progress) => {
            const percent = 80 + progress * 20;
            progressBar.style.width = percent + "%";
            loaderStatus.textContent = "Launching Engine: " + Math.round(percent) + "%";
          }).then(() => {
            loaderStatus.textContent = "Ready to Play";
            playButton.style.display = 'block';
            document.querySelector('.progress-container').style.display = 'none';
          }).catch((err) => {
            loaderStatus.textContent = "Error loading game: " + err;
            loaderStatus.style.color = "#ef4444";
          });
        } catch (e) {
          loaderStatus.textContent = "CDN Error: " + e.message;
          loaderStatus.style.color = "#ef4444";
        }
      })();

      playButton.onclick = () => {
        vexoraLoader.style.opacity = "0";
        unityCanvas.style.display = "block";
        setTimeout(() => { vexoraLoader.style.display = "none"; }, 500);
      };

      // Ad Logic
      (function () {
        const showDelay = 2000;
        const countdownStart = 12;
        const reappearDelay = 60000;
        const adContainer = document.getElementById('ad-container');
        const closeBtn = document.getElementById('close-ad');

        function showAd() {
          adContainer.style.display = 'block';
          adContainer.classList.remove('hidden');
          adContainer.setAttribute('aria-hidden', 'false');

          let timeLeft = countdownStart;
          closeBtn.textContent = `Close (${timeLeft})`;
          closeBtn.disabled = true;
          closeBtn.classList.remove('enabled');

          const t = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
              closeBtn.textContent = `Close (${timeLeft})`;
            } else {
              clearInterval(t);
              closeBtn.disabled = false;
              closeBtn.classList.add('enabled');
              closeBtn.textContent = 'Close ↓';
            }
          }, 1000);
        }

        setTimeout(showAd, showDelay);

        closeBtn.addEventListener('click', () => {
          if (closeBtn.disabled) return;
          adContainer.classList.add('hidden');
          adContainer.setAttribute('aria-hidden', 'true');
          setTimeout(showAd, reappearDelay);
        });
      })();
    </script>
</body>
</html>
