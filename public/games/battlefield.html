<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Battlefield - Vexora</title>
    <style>
        html, body { padding: 0; margin: 0; overflow: hidden; height: 100%; background: #05050a; font-family: 'Inter', sans-serif; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        #vexora-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #05050a; display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 999; transition: opacity 0.5s ease;
        }
        .loader-title {
            color: #fff; font-size: 32px; font-weight: 900; letter-spacing: 8px;
            margin-bottom: 30px; text-transform: uppercase; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(1); }
        }
        .progress-container {
            width: 300px; height: 4px; background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; overflow: hidden; margin-bottom: 20px;
        }
        #progress-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #10b981, #3b82f6);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); transition: width 0.3s ease;
        }
        #play-button {
            display: none; padding: 12px 40px; background: #fff; color: #000;
            border: none; border-radius: 4px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: all 0.2s ease;
        }
        #play-button:hover { background: #10b981; color: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        #status-text { color: rgba(255, 255, 255, 0.5); font-size: 10px; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="vexora-loader">
        <div class="loader-title">VEXORA</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <button id="play-button">Play Battlefield</button>
        <div id="status-text">Connecting to Server...</div>
    </div>

    <iframe id="game-iframe" src="https://v6p9d9t4.ssl.hwcdn.net/html/1641328/index.html" allow="fullscreen; autoplay; cursor-lock"></iframe>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const playButton = document.getElementById('play-button');
        const statusText = document.getElementById('status-text');
        const vexoraLoader = document.getElementById('vexora-loader');
        const gameIframe = document.getElementById('game-iframe');

        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 10;
            if (progress >= 95) {
                progress = 95;
                clearInterval(interval);
                // Simulate final check
                setTimeout(() => {
                    progress = 100;
                    progressBar.style.width = '100%';
                    statusText.innerText = "Ready to Play";
                    playButton.style.display = 'block';
                    document.querySelector('.progress-container').style.display = 'none';
                }, 1000);
            }
            progressBar.style.width = progress + '%';
            statusText.innerText = "Loading Assets: " + Math.round(progress) + "%";
        }, 300);

        playButton.onclick = () => {
            vexoraLoader.style.opacity = "0";
            gameIframe.style.display = "block";
            setTimeout(() => { vexoraLoader.style.display = "none"; }, 500);
        };
    </script>
</body>
</html>
