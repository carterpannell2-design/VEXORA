<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>10 Minutes Till Dawn | Seraph</title>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/10minutestilldawn/">
  <script src="Build/UnityLoader.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&display=swap');
    
    html, body {
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 0;
      margin: 0;
    }
    div#gameContainer {
      background: transparent !important;
      position: absolute;
      width: 100vw;
      height: 100vh;
    }
    div#gameContainer canvas {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    div#gameContainer[data-pixelated="true"] canvas {
      image-rendering: optimizeSpeed;
      image-rendering: -webkit-crisp-edges;
      image-rendering: -moz-crisp-edges;
      image-rendering: -o-crisp-edges;
      image-rendering: crisp-edges;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: optimize-contrast;
      image-rendering: pixelated;
      -ms-interpolation-mode: nearest-neighbor;
    }

    /* Modern Loading Screen */
    #loading-screen {
      position: absolute;
      inset: 0;
      background: #09090b; /* zinc-950 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Inter', system-ui, sans-serif;
      color: white;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    
    .loader-container {
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .game-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: linear-gradient(to bottom, #ffffff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      text-align: center;
    }

    .progress-wrapper {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: #6366f1; /* indigo-500 */
      border-radius: 9999px;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
    }

    .loading-text {
      font-size: 12px;
      color: #a1a1aa; /* zinc-400 */
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #6366f1;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="gameContainer" data-pixelated="true"></div>
  
  <div id="loading-screen">
    <div class="loader-container">
      <div class="spinner"></div>
      <h1 class="game-title">10 Minutes Till Dawn</h1>
      <div class="progress-wrapper">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div id="loading-text" class="loading-text">INITIALIZING...</div>
      <div id="debug-log" style="font-size: 10px; color: #71717a; margin-top: 20px; text-align: center; max-width: 80%; font-family: monospace; opacity: 0.5;"></div>
    </div>
  </div>
  <script>
    const debugLog = document.querySelector("#debug-log");
    const loadingText = document.getElementById('loading-text');
    const progressBar = document.getElementById('progress-bar');

    function logDebug(msg) {
      console.log("[10MinDebug]", msg);
      if (debugLog) {
        const line = document.createElement('div');
        line.textContent = `> ${msg}`;
        debugLog.prepend(line);
        if (debugLog.children.length > 5) debugLog.lastChild.remove();
      }
    }

    async function fetchWithProgress(url, label, progressStart, progressWeight) {
      logDebug(`Fetching ${label}...`);
      try {
        const response = await fetch(url, { mode: 'cors', cache: 'no-cache' });
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        
        if (!response.body) {
          logDebug(`No body stream, using blob fallback`);
          const blob = await response.blob();
          const totalProgress = progressStart + progressWeight;
          if (progressBar) progressBar.style.width = totalProgress + "%";
          return blob;
        }

        const reader = response.body.getReader();
        const contentLength = +response.headers.get('Content-Length') || 0;
        logDebug(`${label} size: ${contentLength} bytes`);
        
        let receivedLength = 0;
        let chunks = [];
        
        while(true) {
          const {done, value} = await reader.read();
          if (done) break;
          chunks.push(value);
          receivedLength += value.length;
          
          if (contentLength > 0) {
            const partProgress = receivedLength / contentLength;
            const totalProgress = progressStart + (partProgress * progressWeight);
            if (progressBar) progressBar.style.width = totalProgress + "%";
            if (loadingText) loadingText.textContent = `Loading ${label}: ${Math.round(totalProgress)}%`;
          } else {
            const mb = (receivedLength / (1024 * 1024)).toFixed(1);
            if (loadingText) loadingText.textContent = `Loading ${label}: ${mb}MB...`;
          }
        }
        logDebug(`${label} loaded successfully`);
        return new Blob(chunks);
      } catch (err) {
        logDebug(`Error fetching ${label}: ${err.message}`);
        throw err;
      }
    }

    function getParts(file, start, end) {
      let arr = [];
      for (let i = start; i <= end; i++) {
        arr.push(file + ".part" + i);
      }
      return arr;
    }

    async function mergeFiles(baseName, start, end, progressStart, totalWeight) {
      const parts = getParts(baseName, start, end);
      const blobs = [];
      const weightPerPart = totalWeight / parts.length;
      
      for (let i = 0; i < parts.length; i++) {
        const blob = await fetchWithProgress(parts[i], baseName, progressStart + (i * weightPerPart), weightPerPart);
        blobs.push(blob);
      }
      
      const combinedBlob = new Blob(blobs, { type: "application/octet-stream" });
      console.log(`[10Min] Merged ${baseName}, size: ${combinedBlob.size}`);
      return combinedBlob;
    }

    function resizeUnityContainer() {
      var container = document.getElementById("gameContainer");
      if (container) {
        container.style.width = window.innerWidth + "px";
        container.style.height = window.innerHeight + "px";
      }
    }

    window.addEventListener('resize', resizeUnityContainer);

    function UnityProgress(gameInstance, progress) {
      try {
        if (progress === 'complete') return;
        var pct = 0;
        if (typeof progress === 'number') pct = progress;
        else if (progress && progress.total && progress.loaded) pct = progress.loaded / progress.total;
        
        var percent = Math.round(80 + pct * 20);
        if (loadingText) loadingText.textContent = 'STARTING ENGINE... ' + percent + '%';
        if (progressBar) progressBar.style.width = percent + '%';
      } catch (e) {
        console.error('Progress error:', e);
      }
    }

    window.addEventListener("load", async function () {
      window.unityMergedFiles = {};

      try {
        const [dataBlob, wasmCodeBlob, wasmFrameworkBlob] = await Promise.all([
          mergeFiles("Build/10MinutesTillDawnWebGL.data.unityweb", 1, 2, 0, 30),
          mergeFiles("Build/10MinutesTillDawnWebGL.wasm.code.unityweb", 1, 2, 30, 30),
          mergeFiles("Build/10MinutesTillDawnWebGL.wasm.framework.unityweb", 1, 1, 60, 20)
        ]);

        window.unityMergedFiles['Build/10MinutesTillDawnWebGL.data.unityweb'] = URL.createObjectURL(dataBlob);
        window.unityMergedFiles['Build/10MinutesTillDawnWebGL.wasm.code.unityweb'] = URL.createObjectURL(wasmCodeBlob);
        window.unityMergedFiles['Build/10MinutesTillDawnWebGL.wasm.framework.unityweb'] = URL.createObjectURL(wasmFrameworkBlob);

        logDebug("Merged files ready");

        const originalFetch = window.fetch.bind(window);
        window.fetch = async function(input, init) {
          let url = typeof input === 'string' ? input : input.url;
          // Simplified key matching
          for (const key of Object.keys(window.unityMergedFiles)) {
            if (url.includes(key)) {
              logDebug(`Intercepting fetch for ${key}`);
              const blobUrl = window.unityMergedFiles[key];
              return originalFetch(blobUrl, init);
            }
          }
          return originalFetch(input, init);
        };

        const OriginalXHR = window.XMLHttpRequest;
        window.XMLHttpRequest = function() {
          const xhr = new OriginalXHR();
          const originalOpen = xhr.open;
          xhr.open = function(method, url, ...args) {
            let urlStr = typeof url === 'string' ? url : url.toString();
            for (const key of Object.keys(window.unityMergedFiles)) {
              if (urlStr.includes(key)) {
                logDebug(`Intercepting XHR for ${key}`);
                return originalOpen.call(this, method, window.unityMergedFiles[key], ...args);
              }
            }
            return originalOpen.call(this, method, url, ...args);
          };
          return xhr;
        };

        window.gameInstance = UnityLoader.instantiate("gameContainer", "Build/10MinutesTillDawnWebGL.json", {
          onProgress: UnityProgress,
          Module: {
            onRuntimeInitialized: function () {
              resizeUnityContainer();
              let loadingScreen = document.querySelector("#loading-screen");
              if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.visibility = 'hidden';
                setTimeout(() => loadingScreen.remove(), 500);
              }
              UnityProgress(window.gameInstance, 'complete');
            }
          }
        });
      } catch (err) {
        logDebug(`CRITICAL ERROR: ${err.message}`);
        if (loadingText) loadingText.textContent = 'LOADING FAILED: ' + err.message.toUpperCase();
        if (progressBar) {
          progressBar.style.backgroundColor = '#ef4444';
          progressBar.style.width = '100%';
        }
      }
    });
  </script>
</body>
</html>
