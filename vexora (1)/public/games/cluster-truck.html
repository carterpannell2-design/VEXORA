<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Cluster Truck | Seraph</title>
    <link href="https://cdn.jsdelivr.net/gh/classrooms-1/google.com@main/TemplateData/style.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&display=swap');
        
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #09090b; 
            width: 100vw; 
            height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .template-wrap { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000;
        }
        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block; 
        }

        /* Modern Loading Screen */
        #loading-screen {
            position: absolute;
            inset: 0;
            background: #09090b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loader-container {
            width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .game-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-align: center;
        }

        .progress-wrapper {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: #6366f1;
            border-radius: 9999px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .loading-text {
            font-size: 12px;
            color: #a1a1aa;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #6366f1;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="template">
    <div id="loading-screen">
        <div class="loader-container">
            <div class="spinner"></div>
            <h1 class="game-title">Cluster Truck</h1>
            <div class="progress-wrapper">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="loading-text" class="loading-text">INITIALIZING...</div>
        </div>
    </div>

    <div class="template-wrap clear">
      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>

    <script type="text/javascript">
      const progressBar = document.getElementById('progress-bar');
      const loadingText = document.getElementById('loading-text');
      const loadingScreen = document.getElementById('loading-screen');

      var Module = {
        TOTAL_MEMORY: 268435456,
        errorhandler: null,
        compatibilitycheck: null,
        backgroundColor: "#222C36",
        splashStyle: "Dark",
        dataUrl: "https://cdn.jsdelivr.net/gh/classrooms-1/google.com@main/Release/NG.data",
        codeUrl: "https://cdn.jsdelivr.net/gh/classrooms-1/google.com@main/Release/NG.js",
        asmUrl: "https://cdn.jsdelivr.net/gh/classrooms-1/google.com@main/Release/NG.asm.js",
        memUrl: "https://cdn.jsdelivr.net/gh/classrooms-1/google.com@main/Release/NG.mem",
        onProgress: function(gameInstance, progress) {
            if (progress === 1) {
                loadingText.textContent = "STARTING ENGINE...";
                progressBar.style.width = "100%";
            } else {
                const pct = Math.round(progress * 100);
                progressBar.style.width = pct + "%";
                loadingText.textContent = "LOADING: " + pct + "%";
            }
        },
        onRuntimeInitialized: function() {
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.visibility = 'hidden';
                setTimeout(() => loadingScreen.remove(), 500);
            }, 1000);
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/classrooms-1/google.com@main/Release/UnityLoader.js"></script>
</body>
</html>
